<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CIS - SIAS Online</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="portal-home" class="sias-wrapper">
        <div class="sias-container">
            <header class="sias-header">
                <img src="CIS logo.png" alt="CIS Logo" class="sias-logo">
                <h1>Cumabao Integrated School</h1>
                <p>Peñablanca, Cagayan</p>
            </header>

            <div class="portal-grid">
                <button class="portal-btn" onclick="enterSection('announcements')">Administrator</button>
                <button class="portal-btn" onclick="enterSection('teachers')">Instructor</button>
                <button class="portal-btn" onclick="enterSection('tracker')">Student</button>
                <button class="portal-btn" onclick="enterSection('announcements')">Parent</button>
                <button class="portal-btn admission" onclick="alert('Admission system opening soon!')">Apply for Admission</button>
            </div>
        </div>
    </div>

    <main id="portal-content" class="hidden">
        <button class="back-link" onclick="goBack()">← Back to Portal</button>
        
        <section id="teachers" class="content-section">
            <h3>👩‍🏫 Instructor Directory</h3>
            <div class="teacher-grid">
                <div class="card teacher-card">
                    <img src="teacher1.jpg" class="teacher-photo">
                    <h4>Mrs. Reyes</h4>
                    <p>Adviser</p>
                </div>
                </div>
        </section>

        <section id="tracker" class="content-section">
            <h3>📊 Student Tracker</h3>
            <input type="text" id="studentID" placeholder="Enter ID (103874120102)">
            <button class="portal-btn" onclick="checkProgress()">Login</button>
            <div id="gradeResult"></div>
        </section>
    </main>

    <script src="script.js"></script>
</body>
</html>
