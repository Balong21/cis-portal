<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CIS - SIAS Online</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="portal-home" class="sias-container">
        <header class="sias-header">
            <img src="cover.jpg" alt="CIS Logo" class="sias-logo">
            <h1>Cumabao Integrated School</h1>
            <p>Peñablanca, Cagayan</p>
            <div class="version-tag">SIAS Online 3.0</div>
        </header>

        <div class="portal-grid">
            <button class="portal-btn" onclick="enterSection('announcements')">Administrator</button>
            <button class="portal-btn" onclick="enterSection('teachers')">Instructor</button>
            <button class="portal-btn" onclick="enterSection('tracker')">Student</button>
            <button class="portal-btn" onclick="enterSection('announcements')">Parent</button>
        </div>

        <a href="#" class="admission-link">Apply for Admission</a>
    </div>

    <main id="portal-content">
        <button class="back-btn" onclick="goBack()">← Back to Portal</button>

        <section id="announcements" class="content-section hidden">
            <h3>📢 Latest Advisories</h3>
            <div class="card urgent"><p>Class suspensions will be posted here.</p></div>
        </section>

        <section id="teachers" class="content-section hidden">
            <h3>👩‍🏫 Faculty Directory</h3>
            <div class="teacher-grid">
                <div class="card teacher-card">
                    <img src="teacher1.jpg" class="teacher-photo">
                    <h4>Mrs. Reyes</h4>
                </div>
            </div>
        </section>

        <section id="tracker" class="content-section hidden highlight-section">
            <h3>📊 Student Portal</h3>
            <p>Please enter your identification number.</p>
            <input type="text" id="studentID" placeholder="ID Number">
            <button class="portal-btn" onclick="checkProgress()">Login</button>
            <div id="gradeResult"></div>
        </section>
    </main>

    <script src="script.js"></script>
</body>
</html>
